    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>MTGX - MTG Meetup Platform</title>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LYF6BM06PS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LYF6BM06PS', { send_page_view: false });
    </script>
  </head>
  <body>
    <script>
      // Apply saved theme before render to prevent flash
      (function(){
        var t = localStorage.getItem('mtgx-theme') || 'dark';
        document.documentElement.classList.remove('dark','forest');
        if (t !== 'light') document.documentElement.classList.add(t);
      })();
    </script>
    <div id="root"></div>
    <script>
      // Auto-reload on chunk load failure (stale deploy after new version)
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.indexOf('dynamically imported module') !== -1) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            // Unregister stale SW before reload so fresh assets are fetched
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
                caches.keys().then(function(names) {
                  names.forEach(function(name) { caches.delete(name); });
                  location.reload();
                });
              });
            } else {
              location.reload();
            }
          }
        }
      });
      // Clear reload flag on successful load
      window.addEventListener('load', function() {
        sessionStorage.removeItem('chunk_reload');
      });
      // One-time SW cache purge (v2: CSP fix)
      if (!localStorage.getItem('sw_purge_v2') && 'serviceWorker' in navigator) {
        localStorage.setItem('sw_purge_v2', '1');
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
            location.reload();
          });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
