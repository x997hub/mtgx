<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0e1019" />
    <meta name="description" content="MTGX - Find MTG games and fill tables in Israel" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <title>MTGX - MTG Meetup Platform</title>
  </head>
  <body>
    <script>
      // Apply saved theme before render to prevent flash
      (function(){
        var t = localStorage.getItem('mtgx-theme');
        if (!t) t = 'dark';
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script>
      // Auto-reload on chunk load failure (stale deploy after new version)
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.indexOf('dynamically imported module') !== -1) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            // Unregister stale SW before reload so fresh assets are fetched
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(regs) {
                regs.forEach(function(r) { r.unregister(); });
                caches.keys().then(function(names) {
                  names.forEach(function(name) { caches.delete(name); });
                  location.reload();
                });
              });
            } else {
              location.reload();
            }
          }
        }
      });
      // Clear reload flag on successful load
      window.addEventListener('load', function() {
        sessionStorage.removeItem('chunk_reload');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
