<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="MTGX - Find MTG games and fill tables in Israel" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>MTGX - MTG Meetup Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Nuke old service workers and caches
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(names) {
          names.forEach(function(n) { caches.delete(n); });
        });
      }
      // Auto-reload once on chunk load failure (stale deploy)
      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('dynamically imported module') !== -1) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            location.reload();
          }
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.message && e.reason.message.indexOf('dynamically imported module') !== -1) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            location.reload();
          }
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
