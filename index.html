<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="description" content="MTGX - Find MTG games and fill tables in Israel" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>MTGX - MTG Meetup Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // One-time: nuke old service workers and stale caches, then reload
      if (navigator.serviceWorker && !window.__swCleaned) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0) {
            Promise.all(regs.map(function(r) { return r.unregister(); }))
              .then(function() { return caches.keys(); })
              .then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              })
              .then(function() {
                window.__swCleaned = true;
                location.reload();
              });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
